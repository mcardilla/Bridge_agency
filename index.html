<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videollamada Privada</title>
    <!-- Probamos con la librería de Fairmeeting -->
    <script src="https://fairmeeting.net/external_api.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        #meet { width: 100%; height: 100vh; }
        .error { color: white; text-align: center; padding-top: 20%; font-family: sans-serif; }
    </style>
</head>
<body>

    <div id="meet"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role');
        const room = urlParams.get('room');

        if (!role || !room) {
            document.body.innerHTML = "<div class='error'><h2>Enlace no válido</h2><p>Faltan parámetros indispensables.</p></div>";
        } else {
            // Dominio a probar
            const domain = 'meet.systemli.org'; 
            
            const options = {
                roomName: room,
                width: '100%',
                height: '100%',
                parentNode: document.querySelector('#meet'),
                interfaceConfigOverwrite: {
                    SHOW_JITSI_WATERMARK: false,
                    SHOW_BRAND_WATERMARK: false,
                    SHOW_WATERMARK_FOR_GUESTS: false
                },
                configOverwrite: {
                    prejoinPageEnabled: false,
                    disableInviteFunctions: true
                }
            };

            // Configuración de controles por rol
            if (role === 'cliente') {
                options.configOverwrite.toolbarButtons = ['microphone', 'camera', 'hangup', 'tileview'];
            } else if (role === 'chica') {
                options.configOverwrite.toolbarButtons = ['microphone', 'camera', 'hangup', 'chat', 'tileview'];
            } else if (role === 'admin') {
                // CÓDIGO DE INVISIBILIDAD TOTAL
                options.configOverwrite.iAmRecorder = true; 
                options.configOverwrite.startWithAudioMuted = true;
                options.configOverwrite.startWithVideoMuted = true;
                options.configOverwrite.toolbarButtons = ['hangup'];
            }

            const api = new JitsiMeetExternalAPI(domain, options);
        }
    </script>
</body>
</html>
