<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirección de Videollamada</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; text-align: center; padding-top: 20%; }
        .loading { font-size: 1.2rem; }
    </style>
</head>
<body>
    <div id="msg" class="loading">Conectando a la sala privada de forma segura...</div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role');
        const room = urlParams.get('room');

        if (!role || !room) {
            document.getElementById('msg').innerHTML = "<h2>Enlace no válido</h2><p>Faltan parámetros indispensables.</p>";
        } else {
            // Volvemos al servidor principal estable, sin límites de tiempo por redirección
            const baseUrl = `https://meet.jit.si/${room}`;
            
            // Configuraciones de Jitsi inyectadas directamente en la URL
            let hashConfig = "#config.prejoinPageEnabled=false&config.disableInviteFunctions=true";

            if (role === 'cliente') {
                // Cliente: Sin botón de chat
                hashConfig += '&config.toolbarButtons=["microphone","camera","hangup","tileview"]';
            } else if (role === 'chica') {
                // Chica: Con chat habilitado
                hashConfig += '&config.toolbarButtons=["microphone","camera","hangup","chat","tileview"]';
            } else if (role === 'admin') {
                // Administrador: Entra oculto (micrófono y cámara apagados al inicio)
                hashConfig += '&config.startWithAudioMuted=true&config.startWithVideoMuted=true';
                hashConfig += '&config.toolbarButtons=["microphone","camera","hangup","chat","tileview","mute-everyone"]';
            }

            // Redirección inmediata automática
            window.location.href = baseUrl + hashConfig;
        }
    </script>
</body>
</html>
